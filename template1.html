<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      color: #222;
      font-size: 13px;
      padding: 48px 52px;
      line-height: 1.55;
    }
    .r-name { font-size: 28px; font-weight: bold; }
    .r-role { font-size: 14px; color: #555; margin: 4px 0; }
    .r-contact { font-size: 11px; color: #666; margin-bottom: 6px; }
    hr { border: none; border-top: 2px solid #c0963a; margin: 12px 0; }
    .section-title {
      font-size: 11px; font-weight: bold;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: #c0963a; margin: 16px 0 6px;
      border-bottom: 1px solid #e8d5a0; padding-bottom: 3px;
    }
    .entry { margin-bottom: 10px; }
    .entry-header { display: flex; justify-content: space-between; font-weight: bold; }
    .entry-sub { color: #666; font-style: italic; font-size: 11px; }
    ul { margin: 5px 0 0 18px; }
    li { margin-bottom: 3px; }
    .skill-tag {
      display: inline-block;
      background: #fdf3d0; border: 1px solid #e8d5a0;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; margin: 2px 3px 2px 0;
    }
  </style>
</head>
<body>
  <!-- Populated dynamically by resume_generator.py -->
  <div class="r-name">{{name}}</div>
  <div class="r-role">{{role}}</div>
  <div class="r-contact">{{contact}}</div>
  <hr/>
  <div class="section-title">Professional Summary</div>
  <p>{{summary}}</p>
  {{education_section}}
  {{experience_section}}
  {{projects_section}}
  {{skills_section}}
</body>
</html>
